name: Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup pnpm
        run: corepack enable

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          WALINE_SERVER_URL: ${{ secrets.WALINE_SERVER_URL || secrets.PUBLIC_WALINE_SERVER_URL || vars.WALINE_SERVER_URL || vars.PUBLIC_WALINE_SERVER_URL }}
          PUBLIC_WALINE_SERVER_URL: ${{ secrets.PUBLIC_WALINE_SERVER_URL || secrets.WALINE_SERVER_URL || vars.PUBLIC_WALINE_SERVER_URL || vars.WALINE_SERVER_URL }}
          PUBLIC_GITHUB_OWNER: ${{ secrets.PUBLIC_GITHUB_OWNER || vars.PUBLIC_GITHUB_OWNER }}
          PUBLIC_GITHUB_REPO: ${{ secrets.PUBLIC_GITHUB_REPO || vars.PUBLIC_GITHUB_REPO }}
          PUBLIC_GITHUB_BRANCH: ${{ secrets.PUBLIC_GITHUB_BRANCH || vars.PUBLIC_GITHUB_BRANCH }}
          PUBLIC_GITHUB_APP_ID: ${{ secrets.PUBLIC_GITHUB_APP_ID || vars.PUBLIC_GITHUB_APP_ID }}
          PUBLIC_WRITE_ENCRYPT_KEY: ${{ secrets.PUBLIC_WRITE_ENCRYPT_KEY || vars.PUBLIC_WRITE_ENCRYPT_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODETIME_TOKEN: ${{ secrets.CODETIME_TOKEN }}
        run: pnpm build

      - name: Sync Algolia index
        continue-on-error: true
        env:
          ALGOLIA_WRITE_API_KEY: ${{ secrets.ALGOLIA_WRITE_API_KEY }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
        run: pnpm run algolia:sync

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          timeout: 900000
          error_count: 20
          reporting_interval: 10000

      - name: Retry Deploy to GitHub Pages
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        with:
          timeout: 900000
          error_count: 20
          reporting_interval: 10000

      - name: Fail if deployment retry failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome != 'success'
        run: exit 1
